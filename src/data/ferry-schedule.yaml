# Thetis / Penelakut / Chemainus Ferry Schedule
# Source: Jan 2025 revised schedule (thetisisland.net/ferry/Jan2025_revised_ferry_schedule.pdf)
# VERIFY with Karl: confirm times match the current BC Ferries schedule.
# Reference: https://www.bcferries.com/routes-fares/schedules/seasonal/THT-CHM

effective_date: "January 2, 2025"

# Each sailing is one trip. Times are listed at each terminal the ferry visits.
# null means the ferry skips that terminal.
# Sailings alternate direction automatically (east then west then east...).
# flag: probable-dc | possible-dc | arrival-only

