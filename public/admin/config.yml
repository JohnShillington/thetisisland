backend:
  name: github
  repo: JohnShillington/thetisisland
  branch: main
  base_url: https://thetisisland-auth.john-shillington.workers.dev

media_folder: public/images
public_folder: /images

collections:
  # ──────────────────────────────────────────────
  # Organizations (Community & Groups page cards)
  # ──────────────────────────────────────────────
  - name: organizations
    label: Organizations
    label_singular: Organization
    folder: src/content/organizations
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { name: name, label: Name, widget: string }
      - { name: tagline, label: Tagline, widget: string, hint: "One-line description shown on the card." }
      - { name: description, label: Description, widget: text, required: false, hint: "Optional longer description for future use." }
      - name: url
        label: Website URL
        widget: string
        required: false
        hint: "Full URL (https://example.com) or internal path (/about). Leave blank if none."
        pattern:
          - '^(https?://[^\s]+|/[^\s]*)$'
          - "Must be a full URL (https://…) or an internal path (/…)"
      - name: category
        label: Category
        widget: select
        options:
          - { label: Organization, value: organization }
          - { label: Club / Volunteer Group, value: club }
          - { label: Social Service, value: social-service }
          - { label: Social & Exercise Group, value: social-exercise }
      - name: tags
        label: Tags
        widget: select
        multiple: true
        required: false
        hint: "Select all that apply."
        options:
          - { label: Official / Government, value: official }
          - { label: Emergency-Related, value: emergency-related }
          - { label: Recreation, value: recreation }
          - { label: Youth & Education, value: youth }
          - { label: Marine & Boating, value: marine }
          - { label: Arts & Culture, value: arts }
          - { label: Health & Wellness, value: health }
      - { name: featured, label: Featured, widget: boolean, default: false, hint: "Featured organizations appear first in their category." }
      - name: editor_notes
        label: "⚠️ Editor Notes (not published)"
        widget: text
        required: false
        hint: "Internal notes for editors — verification flags, questions, reminders. This field is never shown on the public site."

  # ──────────────────────────────────────────────
  # Services (Our Services page)
  # ──────────────────────────────────────────────
  - name: services
    label: Services
    label_singular: Service
    folder: src/content/services
    create: true
    delete: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { name: name, label: Name, widget: string }
      - { name: description, label: Short Description, widget: string, hint: "Brief summary shown in listings." }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - name: editor_notes
        label: "⚠️ Editor Notes (not published)"
        widget: text
        required: false
        hint: "Internal notes for editors — verification flags, questions, reminders. This field is never shown on the public site."
      - { name: body, label: Full Description, widget: markdown, hint: "Detailed description with hours, location, etc." }

  # ──────────────────────────────────────────────
  # Singleton Pages
  # ──────────────────────────────────────────────
  - name: pages
    label: Pages
    label_singular: Page
    folder: src/content/pages
    create: false
    delete: false
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Meta Description, widget: string, required: false, hint: "SEO description shown in search results." }
      - name: editor_notes
        label: "⚠️ Editor Notes (not published)"
        widget: text
        required: false
        hint: "Internal notes for editors — verification flags, questions, reminders. This field is never shown on the public site."
      - { name: body, label: Content, widget: markdown, hint: "Page content in Markdown. Use ## for section headings." }
