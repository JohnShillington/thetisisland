<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thetis Island — Content Editor</title>
</head>
<body>
  <script>
    // DEBUG: Log ALL incoming postMessage events so we can see what arrives
    window.addEventListener("message", function(e) {
      if (typeof e.data === "string" && e.data.indexOf("authorization:") === 0) {
        var el = document.createElement("div");
        el.style.cssText = "position:fixed;top:0;left:0;right:0;background:#0a0;color:#fff;padding:12px;z-index:99999;font-family:monospace;font-size:13px;white-space:pre-wrap";
        el.textContent = "MESSAGE RECEIVED!\nOrigin: " + e.origin + "\nData: " + e.data.substring(0, 80) + "…";
        document.body.appendChild(el);
        console.log("AUTH MESSAGE RECEIVED", e.origin, e.data);
      }
    }, false);

    // Fallback for Safari: if the OAuth callback couldn't use postMessage
    // (window.opener was null), it stores the auth result in sessionStorage
    // and redirects here. Replay it as a message event so Decap picks it up.
    (function() {
      var msg = sessionStorage.getItem("decap-cms-auth");
      if (msg) {
        sessionStorage.removeItem("decap-cms-auth");
        window.addEventListener("load", function() {
          window.postMessage(msg, "*");
        });
      }
    })();
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
